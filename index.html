    <title>حجز طلاب - أ / تامر صالح | فيزياء ثانوية عامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtUQZ7cJwgwVmjWWWFY6krOxNMl1LwLHA",
            authDomain: "physics-booking-tamer-saleh.firebaseapp.com",
            projectId: "physics-booking-tamer-saleh",
            storageBucket: "physics-booking-tamer-saleh.firebasestorage.app",
            messagingSenderId: "1007842108372",
            appId: "1:1007842108372:web:1cc7e06ec456ef6f1c6c41",
            measurementId: "G-G3GFT1MS7N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.submitBooking = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const loading = document.getElementById('loading');

            btnText.style.display = 'none';
            loading.classList.add('active');
            btn.disabled = true;

            try {
                await addDoc(collection(db, "bookings"), {
                    student_name: document.getElementById('student_name').value,
                    school: document.getElementById('school').value,
                    school_type: document.querySelector('input[name="school_type"]:checked').value,
                    phone: document.getElementById('phone').value,
                    grade: document.querySelector('input[name="grade"]:checked').value,
                    created_at: serverTimestamp()
                });

                document.getElementById('successOverlay').classList.add('active');
                document.getElementById('bookingForm').reset();
            } catch (error) {
                console.error(error);
                alert('حدث خطأ، حاول مرة أخرى');
            } finally {
                btnText.style.display = 'flex';
                loading.classList.remove('active');
                btn.disabled = false;
            }
        };

        window.closeSuccess = function() {
            document.getElementById('successOverlay').classList.remove('active');
        };
    </script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #f59e0b;
            --accent-glow: #fbbf24;
            --bg-dark: #0a0f1e;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --physics-blue: #0ea5e9;
            --physics-cyan: #06b6d4;
            --physics-gold: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(14, 165, 233, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(14, 165, 233, 0.04) 0%, transparent 70%);
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: repeating-linear-gradient(60deg, transparent, transparent 2px, rgba(14, 165, 233, 0.015) 2px, rgba(14, 165, 233, 0.015) 4px);
            animation: bgMove 25s linear infinite;
        }
        @keyframes bgMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .hero {
            position: relative;
            padding: 80px 20px 40px;
            text-align: center;
            overflow: hidden;
        }

        .hero-image-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            z-index: 2;
        }

        .hero-img {
            width: 280px;
            height: 360px;
            object-fit: cover;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow:
                0 20px 60px rgba(14, 165, 233, 0.25),
                0 0 100px rgba(14, 165, 233, 0.12),
                inset 0 0 60px rgba(14, 165, 233, 0.04);
            transition: all 0.5s ease;
        }

        .hero-img:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow:
                0 30px 80px rgba(14, 165, 233, 0.35),
                0 0 150px rgba(14, 165, 233, 0.18),
                inset 0 0 80px rgba(14, 165, 233, 0.06);
        }

        .hero-frame {
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 2px solid rgba(14, 165, 233, 0.2);
            border-radius: 28px;
            z-index: 1;
            animation: framePulse 4s ease-in-out infinite;
        }

        .hero-frame::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(245, 158, 11, 0.12);
            border-radius: 20px;
        }

        @keyframes framePulse {
            0%, 100% { border-color: rgba(14, 165, 233, 0.2); }
            50% { border-color: rgba(14, 165, 233, 0.4); }
        }

        .corner {
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid var(--accent);
            z-index: 3;
        }
        .corner-tl { top: -10px; left: -10px; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
        .corner-tr { top: -10px; right: -10px; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
        .corner-bl { bottom: -10px; left: -10px; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
        .corner-br { bottom: -10px; right: -10px; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

        .name {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .title {
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title i { color: var(--primary); }
        .subtitle-text {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }
        .badge i { color: var(--accent); }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .booking-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .booking-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .card-header h2 i { color: var(--accent); }
        .card-header p { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-label i { color: var(--primary); width: 20px; text-align: center; }
        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-input::placeholder { color: rgba(148, 163, 184, 0.5); }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            background: rgba(14, 165, 233, 0.05);
        }
        .form-input[type="tel"] { direction: ltr; text-align: right; }

        .school-type-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .school-type-option { position: relative; }
        .school-type-option input { position: absolute; opacity: 0; cursor: pointer; }
        .school-type-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 10px;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            gap: 8px;
        }
        .school-type-label i { font-size: 1.5rem; color: var(--text-muted); transition: color 0.3s ease; }
        .school-type-label span { font-weight: 700; font-size: 1.1rem; color: var(--text-muted); transition: color 0.3s ease; }
        .school-type-option input:checked + .school-type-label {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.2);
        }
        .school-type-option input:checked + .school-type-label i,
        .school-type-option input:checked + .school-type-label span { color: var(--primary); }
        .school-type-label:hover {
            border-color: rgba(14, 165, 233, 0.5);
            transform: translateY(-2px);
        }

        .grade-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .grade-option { position: relative; }
        .grade-option input { position: absolute; opacity: 0; cursor: pointer; }
        .grade-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            gap: 8px;
        }
        .grade-label i { font-size: 1.5rem; color: var(--text-muted); transition: color 0.3s ease; }
        .grade-label span { font-weight: 700; font-size: 1.1rem; color: var(--text-muted); transition: color 0.3s ease; }
        .grade-label small { font-size: 0.75rem; color: var(--text-muted); opacity: 0.7; }
        .grade-option input:checked + .grade-label {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.2);
        }
        .grade-option input:checked + .grade-label i,
        .grade-option input:checked + .grade-label span { color: var(--primary); }
        .grade-label:hover {
            border-color: rgba(14, 165, 233, 0.5);
            transform: translateY(-2px);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .submit-btn:hover::before { left: 100%; }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(14, 165, 233, 0.4);
        }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn i { font-size: 1.2rem; }

        .success-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .success-overlay.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .success-content { text-align: center; padding: 40px; }
        .success-icon {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 3rem;
            color: white;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
            animation: scaleIn 0.5s ease 0.2s both;
        }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        .success-content h3 { font-size: 1.8rem; margin-bottom: 10px; color: #10b981; }
        .success-content p { color: var(--text-muted); margin-bottom: 25px; }
        .success-close {
            padding: 12px 35px;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .success-close:hover { border-color: var(--primary); color: var(--primary); }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .name { font-size: 1.8rem; }
            .title { font-size: 1.1rem; }
            .booking-card { padding: 25px; }
            .card-header h2 { font-size: 1.4rem; }
            .grade-options { grid-template-columns: 1fr; }
            .school-type-options { grid-template-columns: 1fr; }
            .hero-img { width: 220px; height: 280px; }
        }

        .loading { display: none; }
        .loading.active { display: inline-block; }
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glow-orb {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: -1;
        }
        .glow-orb-1 { top: 10%; right: -100px; background: var(--primary); animation: orbFloat 8s ease-in-out infinite; }
        .glow-orb-2 { bottom: 10%; left: -100px; background: var(--accent); animation: orbFloat 10s ease-in-out infinite reverse; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 30px); } }
    </style>

                    <input type="text" id="student_name" name="student_name" class="form-input" placeholder="اكتب اسمك الكامل" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-school"></i>
                        المدرسة
                    </label>
                    <input type="text" id="school" name="school" class="form-input" placeholder="اسم مدرستك" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-building-columns"></i>
                        نوع المدرسة
                    </label>
                    <div class="school-type-options">
                        <div class="school-type-option">
                            <input type="radio" name="school_type" id="type_general" value="عام" required>
                            <label for="type_general" class="school-type-label">
                                <i class="fas fa-graduation-cap"></i>
                                <span>عام</span>
                            </label>
                        </div>
                        <div class="school-type-option">
                            <input type="radio" name="school_type" id="type_azhar" value="أزهر">
                            <label for="type_azhar" class="school-type-label">
                                <i class="fas fa-mosque"></i>
                                <span>أزهر</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-phone"></i>
                        رقم التليفون
                    </label>
                    <input type="tel" id="phone" name="phone" class="form-input" placeholder="01xxxxxxxxx" pattern="[0-9]*" inputmode="numeric" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-layer-group"></i>
                        السنة الدراسية
                    </label>
                    <div class="grade-options">
                        <div class="grade-option">
                            <input type="radio" name="grade" id="grade1" value="أولى ثانوي" required>
                            <label for="grade1" class="grade-label">
                                <i class="fas fa-book-open"></i>
                                <span>أولى</span>
                                <small>ثانوي</small>
                            </label>
                        </div>
                        <div class="grade-option">
                            <input type="radio" name="grade" id="grade2" value="ثانية ثانوي">
                            <label for="grade2" class="grade-label">
                                <i class="fas fa-book"></i>
                                <span>ثانية</span>
                                <small>ثانوي</small>
                            </label>
                        </div>
                        <div class="grade-option">
                            <input type="radio" name="grade" id="grade3" value="ثالثة ثانوي">
                            <label for="grade3" class="grade-label">
                                <i class="fas fa-graduation-cap"></i>
                                <span>ثالثة</span>
                                <small>ثانوي</small>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">
                        <i class="fas fa-paper-plane"></i>
                        إرسال الحجز
                    </span>
                    <span class="loading" id="loading">
                        <i class="fas fa-spinner"></i>
                        جاري الإرسال...
                    </span>
                </button>
            </form>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3>تم إرسال الحجز بنجاح!</h3>
            <p>سيتم التواصل معك قريباً على رقم التليفون</p>
            <button class="success-close" onclick="closeSuccess()">حسناً</button>
        </div>
    </div>

    <footer>
        <p><i class="fas fa-envelope"></i> tamer.saleh.physics@gmail.com</p>
        <p style="margin-top:8px;">&copy; 2026 أ / تامر صالح — جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
