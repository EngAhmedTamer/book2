<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - طلبات حجز الفيزياء | أ / تامر صالح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtUQZ7cJwgwVmjWWWFY6krOxNMl1LwLHA",
            authDomain: "physics-booking-tamer-saleh.firebaseapp.com",
            projectId: "physics-booking-tamer-saleh",
            storageBucket: "physics-booking-tamer-saleh.firebasestorage.app",
            messagingSenderId: "1007842108372",
            appId: "1:1007842108372:web:1cc7e06ec456ef6f1c6c41",
            measurementId: "G-G3GFT1MS7N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allBookings = [];

        const q = query(collection(db, "bookings"));

        onSnapshot(q, (snapshot) => {
            allBookings = [];
            snapshot.forEach((doc) => {
                allBookings.push({ id: doc.id, ...doc.data() });
            });
            renderBookings(allBookings);
            updateStats(allBookings);
        }, (error) => {
            console.error("خطأ في Firebase:", error);
            document.getElementById('bookingsTable').innerHTML = 
                '<tr><td colspan="8" style="text-align:center;padding:40px;color:#ef4444;">❌ خطأ: ' + error.message + '</td></tr>';
        });

        function renderBookings(bookings) {
            const tbody = document.getElementById('bookingsTable');
            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:10px;display:block;"></i>لا توجد طلبات حتى الآن</td></tr>';
                return;
            }

            tbody.innerHTML = bookings.map((b, i) => {
                const date = b.created_at ? new Date(b.created_at.seconds * 1000).toLocaleString('ar-EG') : '—';
                const gradeColors = {
                    'أولى ثانوي': '#0ea5e9',
                    'ثانية ثانوي': '#f59e0b',
                    'ثالثة ثانوي': '#10b981'
                };
                const typeColors = {
                    'عام': '#8b5cf6',
                    'أزهر': '#10b981'
                };
                const gradeColor = gradeColors[b.grade] || '#0ea5e9';
                const typeColor = typeColors[b.school_type] || '#64748b';

                return `<tr>
                    <td>${i + 1}</td>
                    <td><strong>${b.student_name || '—'}</strong></td>
                    <td>${b.school || '—'}</td>
                    <td><span class="type-badge" style="background:${typeColor}20;color:${typeColor};border:1px solid ${typeColor}40;">${b.school_type || '—'}</span></td>
                    <td dir="ltr" style="text-align:right;">${b.phone || '—'}</td>
                    <td><span class="grade-badge" style="background:${gradeColor}20;color:${gradeColor};border:1px solid ${gradeColor}40;">${b.grade || '—'}</span></td>
                    <td style="font-size:0.8rem;color:#94a3b8;">${date}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteBooking('${b.id}')" title="حذف">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updateStats(bookings) {
            document.getElementById('totalCount').textContent = bookings.length;
            document.getElementById('grade1Count').textContent = bookings.filter(b => b.grade === 'أولى ثانوي').length;
            document.getElementById('grade2Count').textContent = bookings.filter(b => b.grade === 'ثانية ثانوي').length;
            document.getElementById('grade3Count').textContent = bookings.filter(b => b.grade === 'ثالثة ثانوي').length;
            document.getElementById('generalCount').textContent = bookings.filter(b => b.school_type === 'عام').length;
            document.getElementById('azharCount').textContent = bookings.filter(b => b.school_type === 'أزهر').length;

            const schools = [...new Set(bookings.map(b => b.school).filter(Boolean))];
            document.getElementById('schoolCount').textContent = schools.length;
        }

        window.filterByGrade = function(grade) {
            if (grade === 'all') {
                renderBookings(allBookings);
            } else {
                renderBookings(allBookings.filter(b => b.grade === grade));
            }
        };

        window.filterByType = function(type) {
            if (type === 'all') {
                renderBookings(allBookings);
            } else {
                renderBookings(allBookings.filter(b => b.school_type === type));
            }
        };

        window.filterBySchool = function() {
            const search = document.getElementById('schoolSearch').value.toLowerCase();
            if (!search) {
                renderBookings(allBookings);
                return;
            }
            renderBookings(allBookings.filter(b => 
                (b.school && b.school.toLowerCase().includes(search)) ||
                (b.student_name && b.student_name.toLowerCase().includes(search))
            ));
        };

        window.deleteBooking = async function(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الطلب؟')) return;
            try {
                await deleteDoc(doc(db, "bookings", id));
            } catch (e) {
                alert('حدث خطأ أثناء الحذف');
            }
        };

        window.exportToCSV = function() {
            const headers = ['#', 'الاسم', 'المدرسة', 'النوع', 'التليفون', 'السنة', 'التاريخ'];
            const rows = allBookings.map((b, i) => [
                i + 1,
                b.student_name || '',
                b.school || '',
                b.school_type || '',
                b.phone || '',
                b.grade || '',
                b.created_at ? new Date(b.created_at.seconds * 1000).toLocaleString('ar-EG') : ''
            ]);

            let csv = '﻿' + headers.join(',') + '\n';
            rows.forEach(r => { csv += r.join(',') + '\n'; });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'physics_bookings_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
        };
    </script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #f59e0b;
            --bg-dark: #0a0f1e;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, rgba(14,165,233,0.2), rgba(2,132,199,0.1));
            border-bottom: 1px solid var(--border);
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i { color: var(--primary); }
        .header .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

        .export-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .export-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(14,165,233,0.3); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .stat-card i { font-size: 1.5rem; margin-bottom: 8px; }
        .stat-card .number { font-size: 2rem; font-weight: 900; }
        .stat-card .label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
        .stat-card.total i { color: var(--primary); }
        .stat-card.grade1 i { color: #0ea5e9; }
        .stat-card.grade2 i { color: #f59e0b; }
        .stat-card.grade3 i { color: #10b981; }
        .stat-card.general i { color: #8b5cf6; }
        .stat-card.azhar i { color: #10b981; }
        .stat-card.schools i { color: #ec4899; }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(14,165,233,0.15);
            border-color: var(--primary);
            color: var(--primary);
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-input::placeholder { color: var(--text-muted); }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(14,165,233,0.1);
            padding: 16px;
            text-align: right;
            font-weight: 700;
            color: var(--primary);
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 0.95rem;
        }
        tr:hover td { background: rgba(14,165,233,0.03); }
        tr:last-child td { border-bottom: none; }

        .grade-badge, .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .delete-btn {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            background: rgba(239,68,68,0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .header { padding: 20px; }
            .header h1 { font-size: 1.2rem; }
            th, td { padding: 10px; font-size: 0.85rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <div>
            <h1><i class="fas fa-atom"></i> لوحة التحكم</h1>
            <div class="subtitle">إدارة طلبات حجز الفيزياء — أ / تامر صالح</div>
        </div>
        <button class="export-btn" onclick="exportToCSV()">
            <i class="fas fa-file-export"></i>
            تصدير Excel
        </button>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card total">
                <i class="fas fa-users"></i>
                <div class="number" id="totalCount">0</div>
                <div class="label">إجمالي الطلبات</div>
            </div>
            <div class="stat-card grade1">
                <i class="fas fa-book-open"></i>
                <div class="number" id="grade1Count">0</div>
                <div class="label">أولى ثانوي</div>
            </div>
            <div class="stat-card grade2">
                <i class="fas fa-book"></i>
                <div class="number" id="grade2Count">0</div>
                <div class="label">ثانية ثانوي</div>
            </div>
            <div class="stat-card grade3">
                <i class="fas fa-graduation-cap"></i>
                <div class="number" id="grade3Count">0</div>
                <div class="label">ثالثة ثانوي</div>
            </div>
            <div class="stat-card general">
                <i class="fas fa-graduation-cap"></i>
                <div class="number" id="generalCount">0</div>
                <div class="label">عام</div>
            </div>
            <div class="stat-card azhar">
                <i class="fas fa-mosque"></i>
                <div class="number" id="azharCount">0</div>
                <div class="label">أزهر</div>
            </div>
            <div class="stat-card schools">
                <i class="fas fa-school"></i>
                <div class="number" id="schoolCount">0</div>
                <div class="label">عدد المدارس</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterByGrade('all'); setActive(this)">الكل</button>
            <button class="filter-btn" onclick="filterByGrade('أولى ثانوي'); setActive(this)">أولى ثانوي</button>
            <button class="filter-btn" onclick="filterByGrade('ثانية ثانوي'); setActive(this)">ثانية ثانوي</button>
            <button class="filter-btn" onclick="filterByGrade('ثالثة ثانوي'); setActive(this)">ثالثة ثانوي</button>
            <button class="filter-btn" onclick="filterByType('عام'); setActive(this)">عام</button>
            <button class="filter-btn" onclick="filterByType('أزهر'); setActive(this)">أزهر</button>
            <input type="text" class="search-input" id="schoolSearch" placeholder="🔍 ابحث بالمدرسة أو الاسم..." oninput="filterBySchool()">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الطالب</th>
                        <th>المدرسة</th>
                        <th>النوع</th>
                        <th>التليفون</th>
                        <th>السنة</th>
                        <th>التاريخ</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="bookingsTable">
                    <tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">
                        <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:10px;display:block;"></i>
                        جاري تحميل البيانات...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function setActive(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
